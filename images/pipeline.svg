<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow-warn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f9a825"/>
    </marker>
    <marker id="arrow-ok" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#43a047"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="560" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">score-cache — Dagger Pipeline</text>

  <!-- Stage boxes (left column - discovery) -->

  <!-- S-CORE modules -->
  <rect x="20" y="50" width="175" height="52" fill="#e8eaf6" stroke="#7986cb" rx="6"/>
  <text x="107" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#3949ab">S-CORE modules</text>
  <text x="107" y="85" text-anchor="middle" font-size="10" fill="#3949ab">baselibs · MODULE.bazel</text>
  <text x="107" y="98" text-anchor="middle" font-size="10" fill="#3949ab">Cargo.lock · uv.lock</text>

  <!-- resolve-graph -->
  <rect x="20" y="135" width="175" height="52" fill="#fff9c4" stroke="#f9a825" rx="6"/>
  <text x="107" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">resolve-graph</text>
  <text x="107" y="170" text-anchor="middle" font-size="10" fill="#e65100">bazel fetch //...</text>
  <text x="107" y="183" text-anchor="middle" font-size="10" fill="#e65100">mitmproxy sidecar</text>

  <!-- url-inventory.json -->
  <rect x="20" y="220" width="175" height="40" fill="#f3e5f5" stroke="#9c27b0" rx="6"/>
  <text x="107" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#6a1b9a">url-inventory.json</text>
  <text x="107" y="252" text-anchor="middle" font-size="10" fill="#6a1b9a">URL + sha256 per dep</text>

  <!-- classifier -->
  <rect x="20" y="295" width="175" height="40" fill="#fce4ec" stroke="#e91e63" rx="6"/>
  <text x="107" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#880e4f">classifier</text>
  <text x="107" y="327" text-anchor="middle" font-size="10" fill="#880e4f">source_type + mirror_target</text>

  <!-- seed-cache box (middle) -->
  <rect x="250" y="50" width="175" height="290" fill="#e8f5e9" stroke="#43a047" rx="6"/>
  <text x="337" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">seed-cache</text>

  <rect x="262" y="82" width="151" height="40" fill="#c8e6c9" stroke="#43a047" rx="4"/>
  <text x="337" y="99" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">seed bazel-remote</text>
  <text x="337" y="113" text-anchor="middle" font-size="10" fill="#1b5e20">CAS blobs → :9092</text>

  <rect x="262" y="134" width="151" height="40" fill="#c8e6c9" stroke="#43a047" rx="4"/>
  <text x="337" y="151" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">seed devpi</text>
  <text x="337" y="165" text-anchor="middle" font-size="10" fill="#1b5e20">wheels + sdists → :3141</text>

  <rect x="262" y="186" width="151" height="40" fill="#c8e6c9" stroke="#43a047" rx="4"/>
  <text x="337" y="203" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">seed cargo-mirror</text>
  <text x="337" y="217" text-anchor="middle" font-size="10" fill="#1b5e20">crates → :8081/cargo</text>

  <rect x="262" y="238" width="151" height="40" fill="#c8e6c9" stroke="#43a047" rx="4"/>
  <text x="337" y="255" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">seed artifact mirror</text>
  <text x="337" y="269" text-anchor="middle" font-size="10" fill="#1b5e20">archives → :8081/artifacts</text>

  <!-- score-cache image -->
  <rect x="480" y="50" width="175" height="52" fill="#e8f5e9" stroke="#43a047" stroke-width="2" rx="6"/>
  <text x="567" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">score-cache image</text>
  <text x="567" y="87" text-anchor="middle" font-size="10" fill="#1b5e20">YYYYMMDD-&lt;graph-hash&gt;</text>
  <text x="567" y="100" text-anchor="middle" font-size="10" fill="#1b5e20">OCI image tag</text>

  <!-- verify-hermetic -->
  <rect x="480" y="135" width="175" height="65" fill="#fff9c4" stroke="#f9a825" stroke-width="2" rx="6"/>
  <text x="567" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">verify-hermetic</text>
  <text x="567" y="168" text-anchor="middle" font-size="10" fill="#e65100">bazel fetch · build · test</text>
  <text x="567" y="181" text-anchor="middle" font-size="10" fill="#e65100">all egress blocked</text>
  <text x="567" y="194" text-anchor="middle" font-size="10" fill="#e65100">except score-cache</text>

  <!-- publish + record-manifest -->
  <rect x="480" y="230" width="175" height="52" fill="#e3f2fd" stroke="#1e88e5" rx="6"/>
  <text x="567" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">publish-cache</text>
  <text x="567" y="263" text-anchor="middle" font-size="10" fill="#0d47a1">GHCR + archive registry</text>
  <text x="567" y="276" text-anchor="middle" font-size="10" fill="#0d47a1">→ versions.json</text>

  <!-- CACHE end node -->
  <rect x="710" y="220" width="130" height="62" fill="#e0f7fa" stroke="#00838f" rx="6"/>
  <text x="775" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="#004d40">versions.json</text>
  <text x="775" y="263" text-anchor="middle" font-size="10" fill="#004d40">immutable record</text>
  <text x="775" y="276" text-anchor="middle" font-size="10" fill="#004d40">+ GHCR digest</text>

  <!-- Arrows -->
  <!-- S-CORE → resolve-graph -->
  <line x1="107" y1="102" x2="107" y2="133" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- resolve-graph → url-inventory -->
  <line x1="107" y1="187" x2="107" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- url-inventory → classifier -->
  <line x1="107" y1="260" x2="107" y2="293" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- classifier → seed-cache (4 sub-arrows) -->
  <line x1="195" y1="102" x2="248" y2="102" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="195" y1="315" x2="220" y2="315" stroke="#555" stroke-width="1.5"/>
  <line x1="220" y1="102" x2="220" y2="315" stroke="#555" stroke-width="1.5"/>

  <!-- seed-cache → image -->
  <line x1="425" y1="195" x2="478" y2="100" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-ok)"/>
  <!-- image → verify -->
  <line x1="567" y1="102" x2="567" y2="133" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- verify → publish (ok path) -->
  <line x1="567" y1="200" x2="567" y2="228" stroke="#43a047" stroke-width="1.5" marker-end="url(#arrow-ok)"/>
  <!-- verify → inventory (missing dep feedback loop) -->
  <path d="M480 168 Q420 168 420 315 Q420 400 337 400 Q250 400 195 315" stroke="#f9a825" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-warn)"/>
  <text x="430" y="415" text-anchor="middle" font-size="10" fill="#e65100">missing dep detected → add to inventory</text>

  <!-- publish → versions.json -->
  <line x1="655" y1="256" x2="708" y2="256" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels on arrows -->
  <text x="450" y="155" text-anchor="middle" font-size="9" fill="#1b5e20">all deps resolved ✓</text>

  <!-- Legend -->
  <rect x="20" y="470" width="820" height="75" fill="#fff" stroke="#ddd" rx="5"/>
  <text x="430" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Stage descriptions</text>
  <text x="30" y="510" font-size="11" fill="#555">resolve-graph: runs bazel fetch inside a proxied Dagger container; captures every outbound URL via mitmproxy</text>
  <text x="30" y="527" font-size="11" fill="#555">seed-cache: downloads + sha256-verifies every dep; populates bazel-remote, devpi, cargo-mirror, and artifact mirror</text>
  <text x="30" y="544" font-size="11" fill="#555">verify-hermetic: runs bazel fetch/build/test in a network-isolated container; fails if any external request escapes</text>
</svg>
